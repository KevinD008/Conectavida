<!DOCTYPE html>
<html lang="es">
<head>
<link rel="icon" href="include/img/logo.png" type="image/x-icon">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat bot - ConectaVida</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ── Wrapper ── */
    #chat-wrapper {
      width: 100%;
      max-width: 680px;
    }

    #chat-title {
      text-align: center;
      color: rgba(255,255,255,0.9);
      font-size: 1.1em;
      margin-bottom: 14px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    #chatbox {
      background: rgba(255, 255, 255, 0.97);
      border-radius: 20px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 580px;
      box-shadow: 0 8px 35px rgba(0, 0, 0, 0.25);
    }

    /* ── Top bar ── */
    #topbar {
      background: linear-gradient(135deg, #667eea, #764ba2);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 12px; 
    }

    .logo-svg {
      width: 42px; height: 42px;
      flex-shrink: 0;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    .top-info .name { font-size: 15px; font-weight: bold; color: #fff; }
    .top-info .sub  { font-size: 12px; color: rgba(255,255,255,0.75); }

    .online-status {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: rgba(255,255,255,0.85);
    }

    .online-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #84fab0;
    }

    /* ── Messages area ── */
    #msgs {
      flex: 1;
      overflow-y: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    #msgs::-webkit-scrollbar { width: 5px; }
    #msgs::-webkit-scrollbar-thumb {
      background: rgba(102,126,234,0.3);
      border-radius: 10px;
    }

    .msg-row { display: flex; align-items: flex-end; gap: 8px; }
    .msg-row.user { flex-direction: row-reverse; }

    .av {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: bold; flex-shrink: 0;
    }
    .av.bot  { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
    .av.user { background: linear-gradient(135deg, #84fab0, #8fd3f4); color: #2c3e50; }

    .bubble {
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 13.5px;
      line-height: 1.55;
      max-width: 74%;
    }

    .msg-row.bot .bubble {
      background: linear-gradient(135deg, rgba(102,126,234,0.08), rgba(118,75,162,0.08));
      color: #333;
      border-bottom-left-radius: 4px;
      border: 1px solid rgba(102,126,234,0.15);
    }

    .msg-row.user .bubble {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .bubble.error {
      background: linear-gradient(135deg, #ff9a9e, #fecfef);
      color: #8b0000;
      border: none;
    }

    .ts { font-size: 11px; color: #bbb; padding: 0 4px; align-self: flex-end; }

    /* ── Typing indicator ── */
    .typing { display: flex; gap: 4px; align-items: center; padding: 10px 14px; }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #667eea;
      animation: blink 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }

    /* ── Result cards (array responses) ── */
    .result-card {
      background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
      border-radius: 12px;
      padding: 9px 12px;
      margin-top: 7px;
      font-size: 12px;
      line-height: 1.7;
    }
    .result-card b { color: #2c3e50; font-weight: 600; }

    /* ── Input row ── */
    #inputrow {
      padding: 12px 14px;
      border-top: 1px solid rgba(102,126,234,0.15);
      background: rgba(255,255,255,0.98);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #msginput {
      flex: 1;
      padding: 10px 18px;
      border: 2px solid transparent;
      border-radius: 25px;
      font-size: 13.5px;
      background: rgba(102,126,234,0.07);
      color: #333;
      outline: none;
      transition: all .3s ease;
    }

    #msginput:focus {
      border-color: #667eea;
      background: #fff;
      box-shadow: 0 4px 15px rgba(102,126,234,0.2);
      transform: translateY(-1px);
    }

    #sendbtn {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all .3s ease;
    }

    #sendbtn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102,126,234,0.4);
    }

    #sendbtn:active { transform: scale(.95); }

    #sendbtn svg {
      width: 16px; height: 16px;
      fill: none; stroke: #fff;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      #chatbox { height: 100vh; border-radius: 0; }
      body { padding: 0; }
    }
      .red1 {
    position: fixed;
    bottom: 50px;
    right: 20px;
     z-index: 9999;
     color: #fff;
}
.chat-container1{
    display: flex;
    align-items: center;
    gap: 10px;
}
  </style>
</head>
<body>
 <section class="red1">

    <div class="chat-container1">
        <span class="chat-text">
            Volver
        </span>

        <a href="javascript:history.back()">
           <img width="32" height="32" src="https://img.icons8.com/ios-filled/50/ffffff/return.png" alt="return"/>
        </a>

    </div>

</section>
<div id="chat-wrapper">
  <div id="chat-title">ConectaVida &mdash; Asistente IA</div>

  <div id="chatbox">

    <!-- Top bar -->
    <div id="topbar">
      <svg class="logo-svg" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
        <circle cx="30" cy="30" r="25" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="3"/>
        <circle cx="30" cy="30" r="12" fill="rgba(255,255,255,0.9)"/>
        <circle cx="20" cy="20" r="7"  fill="rgba(255,255,255,0.7)"/>
        <circle cx="40" cy="20" r="7"  fill="rgba(255,255,255,0.7)"/>
        <circle cx="30" cy="44" r="7"  fill="rgba(255,255,255,0.7)"/>
      </svg>
      <div class="top-info">
        <div class="name">ConectaVida IA</div>
        <div class="sub">Tu comunidad, tu fortaleza</div>
      </div>
      <div class="online-status">
        <div class="online-dot"></div>
        En línea
      </div>
    </div>

    <!-- Messages -->
    <div id="msgs">
      <div class="msg-row bot">
        <div class="av bot">CV</div>
        <div class="bubble">Hola, Admin. Soy el asistente de ConectaVida. ¿En qué te puedo ayudar hoy?</div>
        <span class="ts" id="initts"></span>
      </div>
    </div>

    <!-- Input -->
    <div id="inputrow">
      <input id="msginput" placeholder="Escribe tu mensaje..."
             autocomplete="off" onkeydown="if(event.key==='Enter') enviar()">
      <button id="sendbtn" onclick="enviar()" aria-label="Enviar">
        <svg viewBox="0 0 24 24">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>

  </div>
</div>

<script>
  const USER = "Admin";
  const msgs = document.getElementById("msgs");

  function nowTime() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }
  document.getElementById("initts").textContent = nowTime();

  function addBubble(role, html, isError = false) {
    const row   = document.createElement("div");
    row.className = "msg-row " + role;
    const label = role === "user" ? USER.slice(0, 2).toUpperCase() : "CV";
    row.innerHTML = `
      <div class="av ${role}">${label}</div>
      <div class="bubble${isError ? ' error' : ''}">${html}</div>
      <span class="ts">${nowTime()}</span>
    `;
    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function addTyping() {
    const row = document.createElement("div");
    row.className = "msg-row bot";
    row.id = "typing";
    row.innerHTML = `
      <div class="av bot">CV</div>
      <div class="bubble" style="padding:0">
        <div class="typing">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </div>`;
    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
  }

  function formatRespuesta(data) {
    if (data.error)      return { html: "Error: " + data.error, err: true };
    if (!data.respuesta) return { html: "Sin respuesta del servidor.", err: false };

    if (Array.isArray(data.respuesta)) {
      const cards = data.respuesta.map(row => {
        const lines = Object.keys(row)
          .map(k => `<b>${k}:</b> ${row[k]}`)
          .join("<br>");
        return `<div class="result-card">${lines}</div>`;
      }).join("");
      return {
        html: `<span style="font-size:12px;color:#555">${data.respuesta.length} resultado(s):</span>${cards}`,
        err: false
      };
    }

    return { html: data.respuesta, err: false };
  }

  function enviar() {
    const input = document.getElementById("msginput");
    const msg   = input.value.trim();
    if (!msg) return;
    input.value = "";

    addBubble("user", msg);
    addTyping();

    fetch(`http://127.0.0.1:8000/chat?mensaje=${encodeURIComponent(msg)}`)
      .then(r => r.json())
      .then(data => {
        removeTyping();
        const { html, err } = formatRespuesta(data);
        addBubble("bot", html, err);
      })
      .catch(() => {
        removeTyping();
        addBubble("bot",
          "No se pudo conectar con el servidor. Verifica que esté corriendo en <code>127.0.0.1:8000</code>.",
          true
        );
      });
  }
</script>

</body>
</html>
